<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="72%">
      <stop offset="0%" stop-color="#154a70"/>
      <stop offset="55%" stop-color="#0b2740"/>
      <stop offset="100%" stop-color="#061726"/>
    </radialGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b9f0f7"/>
      <stop offset="45%" stop-color="#5cd0e4"/>
      <stop offset="100%" stop-color="#0f9ec0"/>
    </linearGradient>
    <linearGradient id="metal2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8fe9f2"/>
      <stop offset="100%" stop-color="#12b0cd"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#020c16" flood-opacity="0.5"/>
    </filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>

  <g transform="translate(512 512) scale(0.82) translate(-512 -512)"><g transform="rotate(-20 512 512)">
    <!-- weicher Schein -->
    <rect x="236" y="402" width="552" height="220" rx="70" fill="#2ecbe0" opacity="0.22" filter="url(#soft)"/>

    <g filter="url(#glow)">
      <!-- Griff -->
      <rect x="360" y="483" width="304" height="58" rx="29" fill="url(#metal)"/>
      <!-- Innenscheiben -->
      <rect x="322" y="432" width="46" height="160" rx="20" fill="url(#metal2)"/>
      <rect x="656" y="432" width="46" height="160" rx="20" fill="url(#metal2)"/>
      <!-- Aussenscheiben -->
      <rect x="238" y="400" width="92" height="224" rx="34" fill="url(#metal)"/>
      <rect x="694" y="400" width="92" height="224" rx="34" fill="url(#metal)"/>
    </g>

    <!-- Gloss oben -->
    <g opacity="0.35">
      <rect x="238" y="404" width="92" height="70" rx="30" fill="#ffffff"/>
      <rect x="694" y="404" width="92" height="70" rx="30" fill="#ffffff"/>
      <rect x="360" y="486" width="304" height="20" rx="10" fill="#ffffff"/>
    </g>
  </g></g>
</svg>
